services:
  nginx:
    image: nginx:1.29.6
    container_name: nginx
    ports:
      - "127.0.0.1:7777:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - postgrest
      - swagger
      - manager
    restart: always

  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

  postgrest:
    image: postgrest/postgrest:v14.6
    environment:
      PGRST_SERVER_HOST: 0.0.0.0
      PGRST_DB_URI: postgresql://authenticator:${AUTHENTICATOR_PASSWORD}@postgres:5432/${DB_NAME}
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_OPENAPI_SERVER_PROXY_URI: https://${SERVER_NAME:-localhost:8080}/postgrest
    depends_on:
      - postgres
      - manager
    restart: always

  swagger:
    image: swaggerapi/swagger-ui:v5.32.0
    environment:
      API_URL: /postgrest/
    depends_on:
      - postgrest

  manager:
    build: .
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      AUTHENTICATOR_PASSWORD: ${AUTHENTICATOR_PASSWORD}
    depends_on:
      - postgres

volumes:
  pgdata:
