services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
  postgrest:
    image: postgrest/postgrest:v14.6
    ports:
      - "3000:3000"
    environment:
      PGRST_SERVER_HOST: 0.0.0.0
      PGRST_DB_URI: postgresql://authenticator:${AUTHENTICATOR_PASSWORD}@postgres:5432/${DB_NAME}
      PGRST_OPENAPI_SERVER_PROXY_URI: http://${HOST_NAME:-localhost}:3000
      PGRST_DB_ANON_ROLE: web_anon
    depends_on:
      - postgres
  swagger:
    image: swaggerapi/swagger-ui:v5.32.0
    ports:
      - "8080:8080"
    expose:
      - "8080"
    environment:
      API_URL: http://${HOST_NAME:-localhost}:3000/
  manager:
    build: .
    ports:
      - ${MANAGER_PORT:-9000}:${MANAGER_PORT:-9000}
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      AUTHENTICATOR_PASSWORD: ${AUTHENTICATOR_PASSWORD}
    depends_on:
      - postgres

volumes:
  pgdata:
