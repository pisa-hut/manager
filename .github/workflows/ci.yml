name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # AUTO_FORMAT_TOKEN re-triggers CI on the auto-format commit
      # (default GITHUB_TOKEN pushes don't, by GitHub policy).
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.AUTO_FORMAT_TOKEN }}
      - uses: dtolnay/rust-toolchain@1.94
        with:
          components: rustfmt
      # Auto-format on PR events: if cargo fmt changes anything,
      # commit + push back; the PAT push starts a fresh CI run.
      # Push-to-main keeps the strict `cargo fmt --check` below.
      - name: Auto-format (PR)
        if: github.event_name == 'pull_request'
        run: |
          cargo fmt
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: cargo fmt"
            git push
            echo "Auto-formatted; a fresh CI run will continue."
            exit 0
          fi
      - run: cargo fmt --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  build:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - run: cargo test
